name: "Node test"
description: "npm ci, gera Prisma (opcional) e roda os testes com cobertura."

inputs:
  node-version:
    description: "Versão do Node"
    default: "20"
  prisma:
    description: "Rodar `npx prisma generate` antes dos testes (true/false)"
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - shell: bash
      run: npm ci
    - if: ${{ inputs.prisma == 'true' }}
      shell: bash
      run: npx prisma generate
    - shell: bash
      run: npm test -- --coverage
