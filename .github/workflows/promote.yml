name: Promote

# Build-once + promote: re-tageia o MESMO digest buildado no dev (commit mesclado =
# HEAD^2) como vX.Y.Z + latest, sem rebuild. Fallback: rebuilda se a imagem sumiu.
# Resolve a versão a partir da tag (GITHUB_REF_NAME) e expõe `version` como output.
on:
  workflow_call:
    inputs:
      registry: { type: string, default: "hub.datawake.cloud" }
      project:  { type: string, required: true }
      app:      { type: string, required: true }
    secrets:
      HARBOR_USERNAME: { required: true }
      HARBOR_PASSWORD: { required: true }
    outputs:
      version:
        value: ${{ jobs.promote.outputs.version }}

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.app }}
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"             # ex.: v1.2.0
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION#v}" >> "$GITHUB_OUTPUT"
          if DEVSHA="$(git rev-parse --verify --short=7 'HEAD^2' 2>/dev/null)"; then
            echo "source_tag=sha-$DEVSHA" >> "$GITHUB_OUTPUT"
          else
            echo "source_tag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - id: check
        env:
          SOURCE_TAG: ${{ steps.v.outputs.source_tag }}
        run: |
          set -euo pipefail
          if [ -n "$SOURCE_TAG" ] && docker buildx imagetools inspect "${IMAGE}:${SOURCE_TAG}" >/dev/null 2>&1; then
            echo "mode=promote" >> "$GITHUB_OUTPUT"
          else
            echo "mode=build" >> "$GITHUB_OUTPUT"
            echo "::warning::Imagem de origem (${SOURCE_TAG:-vazio}) ausente — rebuild do source da tag."
          fi
      - name: Promote (mesmo digest)
        if: steps.check.outputs.mode == 'promote'
        env:
          VERSION: ${{ steps.v.outputs.version }}
          SOURCE_TAG: ${{ steps.v.outputs.source_tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${IMAGE}:${VERSION}" --tag "${IMAGE}:latest" "${IMAGE}:${SOURCE_TAG}"
      - name: Fallback rebuild
        if: steps.check.outputs.mode == 'build'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.v.outputs.version_num }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
