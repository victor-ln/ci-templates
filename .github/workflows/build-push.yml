name: Build & Push

# Builda e dá push da imagem no Harbor. Sem bash: as tags vêm do docker/metadata-action.
on:
  workflow_call:
    inputs:
      registry: { type: string, default: "hub.datawake.cloud" }
      project:  { type: string, required: true }
      app:      { type: string, required: true }
      tags:     { type: string, required: true }   # DSL do docker/metadata-action
      version:  { type: string, default: "1.0.0" } # /p:Version (stamp no binário)
    secrets:
      HARBOR_USERNAME: { required: true }
      HARBOR_PASSWORD: { required: true }
    outputs:
      digest:
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.app }}
          tags: ${{ inputs.tags }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
